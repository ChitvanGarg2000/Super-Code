# ============================================================================
# PRODUCTION DOCKER COMPOSE FOR NEXT.JS + PRISMA + NEXTAUTH ON EC2
# ============================================================================
# Services:
#   - db: PostgreSQL database (production database)
#   - web: Next.js application server
#
# Usage:
#   docker compose up -d          # Start all services in background
#   docker compose logs -f        # View real-time logs
#   docker compose down           # Stop all services
#   docker compose ps             # Check service status
# ============================================================================

version: '3.9'

services:
  # ========================================================================
  # DATABASE SERVICE: PostgreSQL
  # ========================================================================
  db:
    image: postgres:16-alpine
    container_name: super-code-db
    
    # ---- Environment Variables ----
    environment:
      # PostgreSQL superuser credentials
      POSTGRES_USER: ${DB_USER:-supercode_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-supercode_db}
      # PostgreSQL initialization settings
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    
    # ---- Volume Mounts ----
    volumes:
      # Persist database data across container restarts
      - db_data:/var/lib/postgresql/data
      # Optional: Custom initialization scripts
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    
    # ---- Networking ----
    # Connects to 'default' network (services can reference by service name)
    networks:
      - supercode-network
    
    # ---- Port Mapping ----
    ports:
      # Expose PostgreSQL on localhost for development/admin access
      - "5432:5432"
    
    # ---- Health Check ----
    # Ensures database is ready before web service starts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-supercode_user} -d ${DB_NAME:-supercode_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # ---- Restart Policy ----
    restart: unless-stopped
    
    # ---- Logging ----
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # APPLICATION SERVICE: Next.js Web Server
  # ========================================================================
  web:
    # Build the application from Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
      # Pass environment variables from .env as build arguments
      args:
        NODE_ENV: ${NODE_ENV:-production}
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        GITHUB_ID: ${GITHUB_ID}
        GITHUB_SECRET: ${GITHUB_SECRET}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_SECRET: ${GOOGLE_SECRET}
    container_name: super-code-web
    
    # ---- Dependencies ----
    # Wait for database to be healthy before starting
    depends_on:
      db:
        condition: service_healthy
    
    # ---- Port Mapping ----
    ports:
      # Map container port 3000 to host port 3000
      # For EC2: access via http://<EC2_PUBLIC_IP>:3000
      - "3000:3000"
    
    # ---- Environment Configuration ----
    # Load environment from .env file
    env_file:
      - .env
    
    # Override/add environment variables
    environment:
      # Application environment
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      
      # NextAuth Configuration
      # Recommended for Auth.js/NextAuth when behind a proxy / in containers
      AUTH_TRUST_HOST: "true"
      
      # Database Connection
      # Connects to db service using service name in docker network
      DATABASE_URL: "postgresql://${DB_USER:-supercode_user}:${DB_PASSWORD:-change_me_in_production}@db:5432/${DB_NAME:-supercode_db}?schema=public"
      
      # Telemetry (disabled for faster startup)
      NEXT_TELEMETRY_DISABLED: "1"
    
    # ---- Volume Mounts ----
    volumes:
      # Optional: Mount source code for development hot-reload (comment out for production)
      # - .:/app
      # - /app/node_modules
      # Persist logs
      - app_logs:/app/.next
    
    # ---- Networking ----
    networks:
      - supercode-network
    
    # ---- Health Check ----
    # Periodically verify the application is responding
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # ---- Restart Policy ----
    # Automatically restart if the container crashes
    restart: unless-stopped
    
    # ---- Logging ----
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # ---- Resource Limits (optional, uncomment for EC2 with limited resources) ----
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 1G

# ============================================================================
# VOLUMES: Persistent Data Storage
# ============================================================================
volumes:
  # PostgreSQL database data persistence
  db_data:
    driver: local
  # Application logs persistence
  app_logs:
    driver: local

# ============================================================================
# NETWORKS: Internal Communication
# ============================================================================
networks:
  supercode-network:
    driver: bridge
